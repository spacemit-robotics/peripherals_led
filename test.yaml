module: components/peripherals/led

tests:
  - name: led-api-functional
    description: Verifies LED state, toggle, brightness, color, blink, and breath behavior using a mock driver.
    category: functional
    scopes: [pr, scheduled]
    timeout_s: 120
    workdir: sdk
    command: |
      bash components/peripherals/led/tests/test_led_api_contract.sh functional

  - name: led-api-error-paths
    description: Verifies null inputs, malformed driver names, missing drivers, and bus type mismatch handling.
    category: functional
    scopes: [pr, scheduled]
    timeout_s: 120
    workdir: sdk
    command: |
      bash components/peripherals/led/tests/test_led_api_contract.sh error-paths

  - name: led-generic-hardware-smoke
    description: Manually verifies a sysfs LED can be turned on, off, toggled, blinked, and breathed.
    category: functional
    scopes: [manual]
    timeout_s: 180
    workdir: sdk
    requires:
      hardware:
        - LED exposed under /sys/class/leds/LED_SYSFS_NAME.
      supervision: true
    command: |
      bash components/peripherals/led/tests/test_hw_led_generic_smoke.sh
